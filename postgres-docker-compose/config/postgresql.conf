# PostgreSQL configuration — mounted read-only at /etc/postgresql/postgresql.conf
#
# This file covers only settings that differ meaningfully from PostgreSQL defaults
# for a containerised, network-accessible service.  Leave performance tuning
# (shared_buffers, work_mem, etc.) to environment-specific overrides.

####################################################################
# File locations

hba_file  = '/etc/postgresql/pg_hba.conf'
ident_file = '/etc/postgresql/pg_ident.conf'

####################################################################
# Connections

listen_addresses = '*'
port             = 5432
max_connections  = 100

####################################################################
# SSL
#
# Cert filenames follow the certbot / Let's Encrypt convention.
# fullchain.pem already includes the full chain so ssl_ca_file is not needed
# when using certbot certificates — clients verify against public CA roots.
#
# To enable SSL:
#   1. Place fullchain.pem and privkey.pem in ./certs/
#   2. chmod 600 certs/privkey.pem
#      Linux: sudo chown 999:999 certs/privkey.pem
#   3. Uncomment the lines below.
#   4. In pg_hba.conf: uncomment the hostssl rule for external connections.

# ssl          = on
# ssl_cert_file = '/etc/postgresql/certs/fullchain.pem'
# ssl_key_file  = '/etc/postgresql/certs/privkey.pem'

####################################################################
# Logging

log_destination    = 'stderr'
logging_collector  = off
log_min_messages   = warning
log_min_error_statement = error
log_connections    = on
log_disconnections = on
log_line_prefix    = '%t [%p]: user=%u,db=%d,app=%a,client=%h '

####################################################################
# Timezone

timezone     = 'UTC'
log_timezone = 'UTC'
