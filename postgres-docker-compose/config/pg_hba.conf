# PostgreSQL Client Authentication Configuration
# See: https://www.postgresql.org/docs/current/auth-pg-hba-conf.html
#
# Rule type quick reference:
#   host    — matches TCP connections whether or not SSL is in use
#   hostssl — matches TCP connections only when SSL is active
#
# Rules are evaluated top-to-bottom; the first match wins.
#
# TYPE    DATABASE  USER  ADDRESS          METHOD

# Unix-socket connections — used by init scripts and admin tools inside the container.
local     all       all                    trust

# Loopback — scram-sha-256; no SSL needed for local admin access.
host      all       all   127.0.0.1/32     scram-sha-256
host      all       all   ::1/128          scram-sha-256

# Docker network rules — auto-detected at startup by docker/entrypoint.sh.
# One "host" rule is generated per subnet the container is attached to, so any
# Docker service sharing a network with this container can connect without SSL.
# Requires PostgreSQL 16+ for @include_if_exists support.
@include_if_exists '/tmp/pg_hba_docker.conf'

# External network allowlist — SSL required.
# Generated at startup from the POSTGRES_ALLOWED_NETWORKS environment variable.
# If that variable is empty or unset, this file does not exist and external
# connections are blocked (safe default).
@include_if_exists '/tmp/pg_hba_external.conf'
