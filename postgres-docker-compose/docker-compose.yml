services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17}
    restart: unless-stopped
    env_file: .env
    # The entrypoint wrapper generates /tmp/pg_hba_external.conf from
    # POSTGRES_ALLOWED_NETWORKS before handing off to the real entrypoint.
    entrypoint: ["bash", "/docker-entrypoint-wrapper.sh"]
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      # Superuser credentials are delivered as mounted docker secrets
      # (files under ./secrets/), never as plaintext .env values.  Create the
      # secret files before the first `docker compose up` (see README).
      POSTGRES_USER_FILE: /run/secrets/db_superuser_username
      POSTGRES_PASSWORD_FILE: /run/secrets/db_superuser_password
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      # PGDATA points inside the volume mount so the mount point itself can be
      # non-empty without confusing the init check.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config:/etc/postgresql:ro
      # Certs mount must NOT nest under the read-only /etc/postgresql mount --
      # docker cannot create the mountpoint inside a read-only parent.  Mount
      # read-only at a sibling path; postgres only reads the cert files.
      - ./certs:/etc/ssl/postgresql:ro
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./docker/entrypoint.sh:/docker-entrypoint-wrapper.sh:ro
    secrets:
      - db_superuser_username
      - db_superuser_password
    ports:
      # IPv4 — defaults to loopback only.  Set POSTGRES_BIND to a public IP
      # (or 0.0.0.0) for external SSL access.
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
      # IPv6 — defaults to loopback only.  Set POSTGRES_BIND6=:: to listen on
      # all IPv6 interfaces (e.g. for Tailscale fd7a:115c:a1e0::/48 access).
      - "[${POSTGRES_BIND6:-::1}]:${POSTGRES_PORT:-5432}:5432"
    networks:
      - postgres_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-postgres}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  postgres_net:
    # Explicit name so other stacks can reference this network as external without
    # knowing the compose project name.  Other stacks join it with:
    #   networks:
    #     postgres_net:
    #       external: true
    name: ${POSTGRES_NETWORK:-postgres_net}
    driver: bridge

volumes:
  postgres_data:
    driver: local

secrets:
  db_superuser_username:
    file: ./secrets/db_superuser_username
  db_superuser_password:
    file: ./secrets/db_superuser_password
