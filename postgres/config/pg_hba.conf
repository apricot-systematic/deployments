# PostgreSQL Client Authentication Configuration
# See: https://www.postgresql.org/docs/current/auth-pg-hba-conf.html
#
# Rule type quick reference:
#   host    — matches TCP connections whether or not SSL is in use
#   hostssl — matches TCP connections only when SSL is active
#
# Rules are evaluated top-to-bottom; the first match wins.  This ordering
# deliberately allows Docker-internal traffic without SSL while requiring SSL
# for all other network connections.
#
# TYPE    DATABASE  USER  ADDRESS          METHOD

# Unix-socket connections — used by init scripts and admin tools inside the container.
local     all       all                    trust

# Loopback — scram-sha-256; no SSL needed for local admin access.
host      all       all   127.0.0.1/32     scram-sha-256
host      all       all   ::1/128          scram-sha-256

# Docker bridge networks — no SSL required for container-to-container traffic.
# These rules match first, before the hostssl catch-all below.
# Adjust the subnets if your Docker network uses different ranges.
host      all       all   172.16.0.0/12    scram-sha-256
host      all       all   10.0.0.0/8       scram-sha-256

# All other connections — require SSL.
# "hostssl" only matches connections that are actually using SSL, so a non-SSL
# connection from outside the Docker subnets above will not match any rule and
# will be rejected.  Uncomment once SSL is configured in postgresql.conf.
# hostssl all       all   0.0.0.0/0        scram-sha-256
