# PostgreSQL Client Authentication Configuration
# See: https://www.postgresql.org/docs/current/auth-pg-hba-conf.html
#
# TYPE  DATABASE  USER  ADDRESS          METHOD

# Unix-socket connections — used by init scripts and admin tools inside the container.
local   all       all                    trust

# Loopback — scram-sha-256 authentication.
host    all       all   127.0.0.1/32     scram-sha-256
host    all       all   ::1/128          scram-sha-256

# Docker bridge network ranges — no SSL required for container-to-container traffic.
# Adjust these ranges if your Docker network uses different subnets.
host    all       all   172.16.0.0/12    scram-sha-256
host    all       all   10.0.0.0/8       scram-sha-256

# Remote connections — require SSL when connecting from outside the Docker network.
# Uncomment once SSL is configured in postgresql.conf.
# hostssl all     all   0.0.0.0/0        scram-sha-256
