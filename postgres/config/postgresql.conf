# PostgreSQL configuration — mounted read-only at /etc/postgresql/postgresql.conf
#
# This file covers only settings that differ meaningfully from PostgreSQL defaults
# for a containerised, network-accessible service.  Leave performance tuning
# (shared_buffers, work_mem, etc.) to environment-specific overrides.

####################################################################
# File locations

hba_file  = '/etc/postgresql/pg_hba.conf'
ident_file = '/etc/postgresql/pg_ident.conf'

####################################################################
# Connections

listen_addresses = '*'
port             = 5432
max_connections  = 100

####################################################################
# SSL
#
# To enable SSL:
#   1. Place server.crt, server.key, and ca.crt in ./certs/
#   2. Set permissions: chmod 600 certs/server.key; sudo chown 999:999 certs/server.key
#   3. Uncomment the lines below.
#   4. Switch pg_hba.conf remote rule from "host" to "hostssl".

# ssl          = on
# ssl_cert_file = '/etc/postgresql/certs/server.crt'
# ssl_key_file  = '/etc/postgresql/certs/server.key'
# ssl_ca_file   = '/etc/postgresql/certs/ca.crt'

####################################################################
# Logging

log_destination    = 'stderr'
logging_collector  = off
log_min_messages   = warning
log_min_error_statement = error
log_connections    = on
log_disconnections = on
log_line_prefix    = '%t [%p]: user=%u,db=%d,app=%a,client=%h '

####################################################################
# Timezone

timezone     = 'UTC'
log_timezone = 'UTC'
