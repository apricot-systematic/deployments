services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17}
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      # PGDATA points inside the volume mount so the mount point itself can be
      # non-empty without confusing the init check.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config:/etc/postgresql:ro
      - ./certs:/etc/postgresql/certs
      - ./init:/docker-entrypoint-initdb.d:ro
    ports:
      # Bind to 127.0.0.1 by default so the port is not exposed publicly.
      # Set POSTGRES_BIND=0.0.0.0 in .env when external access is needed.
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    driver: local
